name: Build HashCheck Installer

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    # Kompilacja wersji 32-bitowej
    - name: Build x86
      run: |
        msbuild HashCheck.sln /p:Configuration=Release /p:Platform=Win32 /p:OutDir=../Release/Win32/

    # Kompilacja wersji 64-bitowej
    - name: Build x64
      run: |
        msbuild HashCheck.sln /p:Configuration=Release /p:Platform=x64 /p:OutDir=../Release/x64/

    # Budowa instalatora za pomocą makensis
    # Wskazujemy ścieżkę do pliku .nsi
    
    - name: Prepare folders for NSIS
      run: |
        mkdir -p Release/Win32
        mkdir -p Release/x64
        # Kopiujemy pliki tam, gdzie chce ich skrypt .nsi
        cp x64/Release/HashCheck.dll Release/x64/ 2>$null || cp Release/x64/HashCheck.dll Release/x64/
        cp Release/HashCheck.dll Release/Win32/ 2>$null || cp Win32/Release/HashCheck.dll Release/Win32/
      
    - name: Compile NSIS Installer
      run: |
        makensis installer/HashCheck.nsi

    # Zapisanie gotowego pliku .exe jako artefakt do pobrania
    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: HashCheck-Setup
        path: installer/*.exe
name: Build HashCheck Installer

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build x86
      run: |
        msbuild **/HashCheck.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:OutDir=../Release/Win32/

    - name: Build x64
      run: |
        msbuild **/HashCheck.vcxproj /p:Configuration=Release /p:Platform=x64 /p:OutDir=../Release/x64/

    - name: Compile NSIS Installer
      run: |
        makensis installer/HashCheck.nsi

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: HashCheck-Setup-Package
        path: installer/*.exe